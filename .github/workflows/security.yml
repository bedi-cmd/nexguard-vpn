name: Security audit

on:
  schedule:
    # Mondays at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: npm audit (high+)
        run: npm audit --audit-level=high
